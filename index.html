<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>sprite-animations playground</title>
    <script type="module" src="/src/playground/main.ts"></script>
  </head>
  <body>
    <div class="playground-shell">
      <aside class="control-panel">
        <div class="panel-brand">
          <p class="brand-mark">Sprite Animations</p>
        </div>

        <section class="panel-section">
          <h2>Asset</h2>
          <label class="field">
            <span>File</span>
            <div class="upload-field">
              <span class="upload-icon" aria-hidden="true"></span>
              <span>Select image</span>
              <input id="asset-file" type="file" accept="image/*" />
            </div>
          </label>
          <div class="status-inline">
            <span class="status-label">Status</span>
            <strong id="asset-status">No asset loaded</strong>
          </div>
          <div class="asset-meta-row">
            <span id="asset-meta">Choose a local sprite sheet image to begin.</span>
          </div>
        </section>

        <section class="panel-section grid-two">
          <h2>Grid</h2>
          <label class="field">
            <span>Frame width</span>
            <input id="frame-width" type="number" min="1" value="64" />
          </label>
          <label class="field">
            <span>Frame height</span>
            <input id="frame-height" type="number" min="1" value="64" />
          </label>
          <label class="field">
            <span>Columns</span>
            <input id="columns" type="number" min="1" value="4" />
          </label>
          <label class="field">
            <span>Rows</span>
            <input id="rows" type="number" min="1" value="4" />
          </label>
          <label class="field field-full">
            <span>Total frames</span>
            <input id="total-frames" type="number" min="1" placeholder="defaults to columns x rows" />
          </label>
        </section>

        <section class="panel-section grid-two">
          <h2>Timing</h2>
          <label class="field">
            <span>FPS</span>
            <input id="fps" type="number" min="1" value="12" />
          </label>
          <label class="field">
            <span>Duration (ms)</span>
            <input id="duration" type="number" min="0" placeholder="optional" />
          </label>
          <label class="field field-checkbox field-full">
            <input id="loop" type="checkbox" checked />
            <span>Loop animation</span>
          </label>
        </section>

        <section class="panel-section grid-two">
          <h2>Transform</h2>
          <label class="field">
            <span>Position X</span>
            <input id="position-x" type="number" value="160" />
          </label>
          <label class="field">
            <span>Position Y</span>
            <input id="position-y" type="number" value="120" />
          </label>
          <label class="field">
            <span>Scale</span>
            <input id="scale" type="number" min="0.1" step="0.1" value="2" />
          </label>
          <label class="field">
            <span>Grid opacity</span>
            <input id="grid-visibility" type="number" min="0" max="1" step="0.1" value="0.4" />
          </label>
        </section>

        <section class="panel-section grid-two">
          <h2>Canvas</h2>
          <label class="field">
            <span>Canvas width</span>
            <input id="canvas-width" type="number" min="64" value="640" />
          </label>
          <label class="field">
            <span>Canvas height</span>
            <input id="canvas-height" type="number" min="64" value="360" />
          </label>
        </section>

        <section class="panel-section">
          <h2>Playback</h2>
          <div class="button-row">
            <button id="play-button" type="button" class="button-primary">Play</button>
            <button id="pause-button" type="button">Pause</button>
            <button id="stop-button" type="button">Stop</button>
          </div>
          <div class="status-grid">
            <div>
              <span class="metric-label">Frame</span>
              <strong id="current-frame">0</strong>
            </div>
            <div>
              <span class="metric-label">State</span>
              <strong id="playback-state">idle</strong>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h2>Config</h2>
          <div class="button-row">
            <button id="save-config" type="button">Save JSON</button>
            <button id="copy-config" type="button">Copy JSON</button>
          </div>
          <textarea
            id="config-output"
            rows="10"
            spellcheck="false"
            readonly
          ></textarea>
        </section>
      </aside>

      <main class="preview-panel">
        <div class="preview-header">
          <div>
            <h1>Playground</h1>
          </div>
          <p id="preview-message">Select an image.</p>
        </div>
        <div class="canvas-stage">
          <canvas id="preview-canvas" width="640" height="360"></canvas>
        </div>
      </main>
    </div>
  </body>
</html>
